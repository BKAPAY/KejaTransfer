    <style>
      #app-loading {
        position:fixed;inset:0;
        background: radial-gradient(ellipse at 40% 40%, #1a2468 0%, #0c1133 55%, #060d24 100%);
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        z-index:9999;transition:opacity 0.5s ease;overflow:hidden;
      }
      /* Floating background orbs */
      .bka-orb {
        position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;
      }
      /* Logo glow pulse */
      @keyframes bka-glow {
        0%,100%{filter:drop-shadow(0 0 10px rgba(38,196,176,0.25)) drop-shadow(0 0 30px rgba(38,196,176,0.1));}
        50%{filter:drop-shadow(0 0 22px rgba(38,196,176,0.55)) drop-shadow(0 0 50px rgba(38,196,176,0.2));}
      }
      /* Orb float */
      @keyframes bka-orb1 {
        0%,100%{transform:translate(0,0) scale(1);}
        50%{transform:translate(30px,-20px) scale(1.1);}
      }
      @keyframes bka-orb2 {
        0%{transform:translate(0,0) scale(1);}
        33%{transform:translate(-25px,15px) scale(0.95);}
        66%{transform:translate(20px,25px) scale(1.05);}
        100%{transform:translate(0,0) scale(1);}
      }
      /* Progress bar fill */
      @keyframes bka-progress {
        0%{width:0%;}
        15%{width:18%;}
        40%{width:45%;}
        65%{width:68%;}
        85%{width:82%;}
        100%{width:91%;}
      }
      /* Text fade cycle */
      @keyframes bka-label {
        0%,20%{opacity:1;}
        25%,45%{opacity:0.4;}
        50%,70%{opacity:1;}
        75%,95%{opacity:0.4;}
        100%{opacity:1;}
      }
      /* Step dots */
      @keyframes bka-step {
        0%,30%{opacity:0.25;}
        35%,65%{opacity:1;transform:scale(1.3);}
        70%,100%{opacity:0.25;transform:scale(1);}
      }
    </style>

    <div id="root">
      <div id="app-loading">

        <!-- Background ambient orbs -->
        <div class="bka-orb" style="width:350px;height:350px;background:rgba(38,196,176,0.06);top:-60px;left:-80px;animation:bka-orb1 7s ease-in-out infinite;"></div>
        <div class="bka-orb" style="width:280px;height:280px;background:rgba(60,80,200,0.08);bottom:-40px;right:-60px;animation:bka-orb2 9s ease-in-out infinite;"></div>
        <div class="bka-orb" style="width:180px;height:180px;background:rgba(38,196,176,0.05);top:30%;right:10%;animation:bka-orb1 11s ease-in-out infinite reverse;"></div>

        <!-- Logo -->
        <img src="/bkapay-logo.png" alt="BKApay" style="height:64px;width:auto;margin-bottom:32px;animation:bka-glow 2.5s ease-in-out infinite;" />

        <!-- Progress bar container -->
        <div style="width:220px;margin-bottom:16px;">
          <div style="height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;">
            <div style="height:100%;background:linear-gradient(90deg,#26c4b0,#4f8ef7);border-radius:2px;animation:bka-progress 4s ease-in-out infinite;"></div>
          </div>
        </div>

        <!-- Status text -->
        <p style="color:rgba(255,255,255,0.45);font-family:Inter,sans-serif;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;margin:0;animation:bka-label 4s ease-in-out infinite;">
          Initialisation en cours
        </p>

        <!-- Step indicator dots -->
        <div style="display:flex;gap:6px;margin-top:14px;">
          <span style="width:5px;height:5px;border-radius:50%;background:#26c4b0;display:block;animation:bka-step 4s 0s ease-in-out infinite;"></span>
          <span style="width:5px;height:5px;border-radius:50%;background:#26c4b0;display:block;animation:bka-step 4s 0.4s ease-in-out infinite;"></span>
          <span style="width:5px;height:5px;border-radius:50%;background:#26c4b0;display:block;animation:bka-step 4s 0.8s ease-in-out infinite;"></span>
        </div>

      </div>
    </div>
