  <body>
    <style>
      #app-loading {
        position:fixed;inset:0;
        background: radial-gradient(ellipse at 40% 40%, #1a2468 0%, #0c1133 55%, #060d24 100%);
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        z-index:9999;transition:opacity 0.5s ease;overflow:hidden;
      }
      /* Floating background orbs */
      .bka-orb {
        position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;
      }
      /* Logo glow pulse */
      @keyframes bka-glow {
        0%,100%{filter:drop-shadow(0 0 10px rgba(38,196,176,0.25)) drop-shadow(0 0 30px rgba(38,196,176,0.1));}
        50%{filter:drop-shadow(0 0 22px rgba(38,196,176,0.55)) drop-shadow(0 0 50px rgba(38,196,176,0.2));}
      }
      /* Orb float */
      @keyframes bka-orb1 {
        0%,100%{transform:translate(0,0) scale(1);}
        50%{transform:translate(30px,-20px) scale(1.1);}
      }
      @keyframes bka-orb2 {
        0%{transform:translate(0,0) scale(1);}
        33%{transform:translate(-25px,15px) scale(0.95);}
        66%{transform:translate(20px,25px) scale(1.05);}
        100%{transform:translate(0,0) scale(1);}
      }
      /* Character sway */
      @keyframes bka-sway {
        0%,100%{transform:rotate(-2.5deg);}
        50%{transform:rotate(2.5deg);}
      }
      /* Broom sweep */
      @keyframes bka-broom {
        0%,100%{transform:rotate(0deg);}
        45%{transform:rotate(26deg);}
        55%{transform:rotate(26deg);}
      }
      /* Bounce-bob for head */
      @keyframes bka-bob {
        0%,100%{transform:translateY(0);}
        50%{transform:translateY(-2px);}
      }
      /* Dust puffs */
      @keyframes bka-dust-a {
        0%{opacity:0;transform:translate(0,0) scale(0);}
        20%{opacity:0.7;transform:translate(-8px,-6px) scale(1);}
        100%{opacity:0;transform:translate(-22px,-4px) scale(0.4);}
      }
      @keyframes bka-dust-b {
        0%{opacity:0;transform:translate(0,0) scale(0);}
        25%{opacity:0.5;transform:translate(-14px,-12px) scale(1);}
        100%{opacity:0;transform:translate(-28px,-2px) scale(0.3);}
      }
      @keyframes bka-dust-c {
        0%{opacity:0;transform:translate(0,0) scale(0);}
        30%{opacity:0.6;transform:translate(-5px,-18px) scale(1);}
        100%{opacity:0;transform:translate(-12px,0px) scale(0.3);}
      }
      /* Sparkle stars */
      @keyframes bka-star {
        0%,100%{opacity:0;transform:scale(0) rotate(0deg);}
        40%,60%{opacity:1;transform:scale(1) rotate(180deg);}
      }
      /* Progress bar fill */
      @keyframes bka-progress {
        0%{width:0%;}
        15%{width:18%;}
        40%{width:45%;}
        65%{width:68%;}
        85%{width:82%;}
        100%{width:91%;}
      }
      /* Text fade cycle */
      @keyframes bka-label {
        0%,20%{opacity:1;}
        25%,45%{opacity:0.4;}
        50%,70%{opacity:1;}
        75%,95%{opacity:0.4;}
        100%{opacity:1;}
      }
      /* Step dots */
      @keyframes bka-step {
        0%,30%{opacity:0.25;}
        35%,65%{opacity:1;transform:scale(1.3);}
        70%,100%{opacity:0.25;transform:scale(1);}
      }
    </style>

    <div id="root">

                      animation:bka-sway 2s ease-in-out infinite;

            <rect x="72" y="82" width="18" height="88" rx="20" fill="rgba(0,0,0,0.07)"/>

            <!-- NECK: thick line seamlessly connecting head to torso -->

            <!-- RIGHT ARM: two thick lines that share an endpoint = no gap at elbow -->

              <g style="transform-origin:0px 0px;animation:bka-broom 2s ease-in-out infinite;">

                <!-- Mop head body (rectangular teal bar) -->
                <rect x="-116" y="116" width="60" height="12" rx="6" fill="#26c4b0"/>
                <rect x="-115" y="116" width="16" height="12" rx="5" fill="rgba(255,255,255,0.16)"/>
                <!-- Mop wet strands — 7 even strands -->
                <line x1="-112" y1="127" x2="-114" y2="143" stroke="#18a897" stroke-width="4" stroke-linecap="round"/>
                <line x1="-103" y1="127" x2="-104" y2="143" stroke="#18a897" stroke-width="3.5" stroke-linecap="round"/>
                <line x1="-94" y1="127" x2="-94" y2="143" stroke="#18a897" stroke-width="3.5" stroke-linecap="round"/>
                <line x1="-85" y1="127" x2="-84" y2="143" stroke="#18a897" stroke-width="3.5" stroke-linecap="round"/>
                <line x1="-76" y1="127" x2="-75" y2="143" stroke="#18a897" stroke-width="3.5" stroke-linecap="round"/>
                <line x1="-67" y1="127" x2="-66" y2="143" stroke="#18a897" stroke-width="4" stroke-linecap="round"/>
                <!-- Water sheen droplets -->
                <ellipse cx="-106" cy="137" rx="1.2" ry="3" fill="rgba(150,240,230,0.5)"/>
                <ellipse cx="-88" cy="137" rx="1.2" ry="3" fill="rgba(150,240,230,0.5)"/>
                <ellipse cx="-70" cy="137" rx="1.2" ry="3" fill="rgba(150,240,230,0.5)"/>
